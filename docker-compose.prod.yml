# Production compose file — references the published GHCR image instead of
# building locally. Use this on Unraid (via the Docker Compose Manager plugin)
# or any other host where you want to pull the image rather than build it.
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# The bind-mount paths below follow the Unraid convention
# (`/mnt/user/appdata/oluhome/...`) — adjust for non-Unraid hosts.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oluhome}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-oluhome}
    volumes:
      - ${DB_DATA_DIR:-/mnt/user/appdata/oluhome/db}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oluhome} -d ${POSTGRES_DB:-oluhome}"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    image: ${IMAGE:-ghcr.io/olumentary/oluhome}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      # --- Database ---
      DATABASE_URL: postgres://${POSTGRES_USER:-oluhome}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-oluhome}
      DB_DRIVER: node-postgres

      # --- Storage ---
      STORAGE_DRIVER: local
      STORAGE_LOCAL_DIR: /app/data/uploads

      # --- Auth ---
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${APP_URL}
      NEXT_PUBLIC_APP_URL: ${APP_URL}

      # --- First-boot admin (idempotent; skipped if user already exists) ---
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Admin}

      # --- Feature flags ---
      OLUHOME_AI_ENABLED: ${OLUHOME_AI_ENABLED:-false}
      OLUHOME_AI_BETA_ACCESS: ${OLUHOME_AI_BETA_ACCESS:-false}
      OLUHOME_REGISTRATION_OPEN: ${OLUHOME_REGISTRATION_OPEN:-true}
      OLUHOME_SUBSCRIPTIONS_ENABLED: ${OLUHOME_SUBSCRIPTIONS_ENABLED:-false}

      # --- Optional: AI provider ---
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ${UPLOADS_DIR:-/mnt/user/appdata/oluhome/uploads}:/app/data/uploads
    ports:
      - "${APP_PORT:-3000}:3000"
